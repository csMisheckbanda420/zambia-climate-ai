# render.yaml - Blueprint for Render deployment
services:
  - type: web
    name: zambia-climate-ai
    runtime: python
    repo: https://github.com/YOUR_USERNAME/zambia-climate-ai
    plan: free
    region: frankfurt  # Closest to Zambia
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python generate_dataset.py
    startCommand: streamlit run main.py --server.port $PORT --server.address 0.0.0.0 --server.enableCORS false --server.enableXsrfProtection false
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: STREAMLIT_SERVER_MAX_UPLOAD_SIZE
        value: 200
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: false
      - key: STREAMLIT_SERVER_ENABLE_CORS
        value: false
      - key: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
        value: false
    healthCheckPath: /
    autoDeploy: true